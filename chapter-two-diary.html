<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter Two — March 13, 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #c9768a;
    --rose-light: #f5e6ea;
    --rose-pale: #fdf6f8;
    --blush: #e8b4c0;
    --mauve: #8b5a6e;
    --petal: #f9edf1;
    --gold: #c9a96e;
    --cream: #fdf8f3;
    --text-dark: #3d2535;
    --text-mid: #7a4f62;
    --text-light: #b08898;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--cream);
    font-family: 'Jost', sans-serif;
    color: var(--text-dark);
    min-height: 100vh;
  }

  /* ── FALLING PETALS ── */
  .petal-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .fp {
    position: absolute;
    top: -40px;
    border-radius: 50% 0 50% 0;
    opacity: 0;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0%   { opacity: 0; transform: translateY(0) rotate(0deg); }
    10%  { opacity: 0.35; }
    90%  { opacity: 0.2; }
    100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
  }

  /* ── LAYOUT ── */
  .diary-wrap {
    max-width: 880px;
    margin: 0 auto;
    padding-bottom: 100px;
    position: relative;
    z-index: 1;
  }

  /* ── COVER ── */
  .cover {
    text-align: center;
    padding: 90px 40px 60px;
    position: relative;
    background: linear-gradient(180deg, #fdeef3 0%, var(--cream) 100%);
  }

  .cover-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 28px;
    color: var(--blush);
  }

  .cover-ornament span {
    font-size: 10px;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--rose);
    font-family: 'Jost', sans-serif;
    font-weight: 400;
  }

  .cover-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(52px, 10vw, 84px);
    font-weight: 300;
    color: var(--text-dark);
    line-height: 1;
    margin-bottom: 10px;
    letter-spacing: -1px;
    animation: fadeUp 1s ease 0.2s both;
  }

  .cover-title em { font-style: italic; color: var(--rose); }

  .cover-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 19px;
    color: var(--text-light);
    margin-bottom: 32px;
    letter-spacing: 1px;
    animation: fadeUp 1s ease 0.4s both;
  }

  .cover-date {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--mauve);
    border-top: 1px solid var(--blush);
    border-bottom: 1px solid var(--blush);
    padding: 9px 28px;
    margin-bottom: 56px;
    animation: fadeUp 1s ease 0.6s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 18px;
    margin: 0 40px 0;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--blush), transparent);
  }

  /* ── NAV ── */
  .nav {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 44px 24px 40px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    background: rgba(253,248,243,0.92);
    backdrop-filter: blur(12px);
    z-index: 50;
    border-bottom: 1px solid rgba(232,180,192,0.3);
  }

  .nav-btn {
    padding: 10px 24px;
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    border: 1px solid var(--blush);
    background: transparent;
    color: var(--text-mid);
    cursor: pointer;
    border-radius: 40px;
    transition: all 0.3s ease;
  }

  .nav-btn:hover { background: var(--rose-light); color: var(--rose); border-color: var(--rose); }
  .nav-btn.active { background: var(--rose); color: white; border-color: var(--rose); }

  /* ── SECTIONS ── */
  .section { display: none; padding: 48px 40px 0; animation: fadeUp 0.5s ease; }
  .section.active { display: block; }

  .section-heading {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 300;
    color: var(--text-dark);
    margin-bottom: 6px;
  }

  .section-heading em { font-style: italic; color: var(--rose); }

  .section-sub {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 36px;
  }

  /* ── GALLERY ── */
  .gallery-grid {
    columns: 2;
    gap: 16px;
    margin-bottom: 28px;
  }

  @media (max-width: 560px) { .gallery-grid { columns: 1; } }

  .photo-slot {
    break-inside: avoid;
    margin-bottom: 16px;
    border-radius: 6px;
    overflow: hidden;
    background: var(--petal);
    border: 1px solid var(--blush);
    transition: transform 0.35s ease, box-shadow 0.35s ease;
    cursor: default;
  }

  .photo-slot:nth-child(odd):hover  { transform: translateY(-5px) rotate(-0.6deg); box-shadow: 0 16px 48px rgba(201,118,138,0.2); }
  .photo-slot:nth-child(even):hover { transform: translateY(-5px) rotate(0.6deg);  box-shadow: 0 16px 48px rgba(201,118,138,0.2); }

  .photo-slot img {
    width: 100%;
    display: block;
    object-fit: cover;
  }

  .photo-caption-area { padding: 12px 14px; background: white; }

  .photo-caption-input {
    width: 100%;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--text-mid);
    border: none;
    outline: none;
    background: transparent;
    resize: none;
    line-height: 1.5;
  }

  .photo-caption-input::placeholder { color: var(--blush); }

  /* ── VIDEO ── */
  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
    margin-bottom: 28px;
  }

  .video-slot {
    border-radius: 8px;
    overflow: hidden;
    background: var(--petal);
    border: 1px solid var(--blush);
    transition: transform 0.3s ease;
  }

  .video-slot:hover { transform: translateY(-5px); }

  .video-thumb {
    aspect-ratio: 16/9;
    position: relative;
    background: linear-gradient(135deg, #f0d4dc, #e4bec9);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .video-thumb video { width: 100%; height: 100%; object-fit: cover; display: block; }

  .play-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 52px; height: 52px;
    background: rgba(255,255,255,0.9);
    border-radius: 50%;
    border: none;
    cursor: pointer;
    color: var(--rose);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.25s ease;
  }

  .play-btn:hover { transform: translate(-50%, -50%) scale(1.12); }

  .video-info { padding: 14px 16px; }

  .video-title-input {
    width: 100%;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dark);
    border: none;
    outline: none;
    background: transparent;
  }

  .video-title-input::placeholder { color: var(--blush); }

  /* ── UPLOAD ZONES ── */
  .upload-zone {
    display: block;
    border: 2px dashed var(--blush);
    border-radius: 14px;
    padding: 44px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: var(--rose-pale);
    margin-bottom: 16px;
  }

  .upload-zone:hover { border-color: var(--rose); background: var(--petal); }
  .upload-zone input[type="file"] { display: none; }
  .upload-text { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-style: italic; color: var(--text-mid); margin-bottom: 6px; }
  .upload-hint { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-light); }

  /* ── JOURNAL ── */
  .journal-paper {
    background: white;
    border-radius: 8px;
    padding: 48px 52px 40px;
    border: 1px solid var(--blush);
    position: relative;
    margin-bottom: 24px;
    box-shadow: 0 2px 28px rgba(201,118,138,0.07);
  }

  .journal-paper::before {
    content: '';
    position: absolute;
    left: 76px; top: 0; bottom: 0;
    width: 1px;
    background: rgba(201,168,176,0.28);
  }

  .journal-date-stamp {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--blush);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .journal-date-stamp::after { content: ''; flex: 1; height: 1px; background: var(--rose-light); }

  .journal-textarea {
    width: 100%;
    min-height: 280px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    line-height: 2;
    color: var(--text-dark);
    border: none;
    outline: none;
    resize: vertical;
    background: transparent;
  }

  .journal-textarea::placeholder { color: var(--blush); font-style: italic; }

  .mood-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 22px;
    padding-top: 22px;
    border-top: 1px solid var(--rose-light);
    align-items: center;
  }

  .mood-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-light); }

  .mood-tag {
    padding: 6px 16px;
    border-radius: 40px;
    border: 1px solid var(--blush);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    font-family: 'Jost', sans-serif;
  }

  .mood-tag.picked { background: var(--rose-light); color: var(--rose); border-color: var(--rose); }

  /* ── TIMELINE ── */
  .timeline {
    position: relative;
    padding-left: 44px;
    margin-bottom: 16px;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 15px; top: 10px; bottom: 10px;
    width: 1px;
    background: linear-gradient(180deg, transparent, var(--blush) 15%, var(--blush) 85%, transparent);
  }

  .tl-item { position: relative; margin-bottom: 40px; }

  .tl-dot {
    position: absolute;
    left: -37px; top: 6px;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: var(--rose-light);
    border: 2px solid var(--rose);
    transition: all 0.25s;
  }

  .tl-item:hover .tl-dot { background: var(--rose); transform: scale(1.25); }

  .tl-time {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 5px;
  }

  .tl-time-input {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-light);
    border: none;
    outline: none;
    background: transparent;
    width: 200px;
    font-family: 'Jost', sans-serif;
    margin-bottom: 5px;
    display: block;
  }

  .tl-time-input::placeholder { color: #dcc0c8; }

  .tl-title-input {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 400;
    color: var(--text-dark);
    border: none;
    outline: none;
    background: transparent;
    width: 100%;
    margin-bottom: 8px;
    display: block;
  }

  .tl-title-input::placeholder { color: var(--blush); font-style: italic; }

  .tl-note-input {
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.8;
    border: none;
    outline: none;
    background: transparent;
    width: 100%;
    resize: none;
    display: block;
  }

  .tl-note-input::placeholder { color: var(--text-light); }

  /* ── BUTTONS ── */
  .add-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--rose);
    border: 1px dashed var(--blush);
    background: transparent;
    padding: 12px 26px;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 8px;
  }

  .add-btn:hover { background: var(--rose-light); border-color: var(--rose); }

  /* ── SAVE BAR ── */
  .save-bar {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--rose);
    color: white;
    padding: 12px 28px;
    border-radius: 40px;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-family: 'Jost', sans-serif;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(201,118,138,0.4);
    transition: all 0.25s;
    z-index: 999;
    border: none;
  }

  .save-bar:hover { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(201,118,138,0.45); }

  .saved-toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--mauve);
    color: white;
    padding: 12px 28px;
    border-radius: 40px;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-family: 'Jost', sans-serif;
    display: none;
    z-index: 999;
    animation: fadeUp 0.3s ease;
  }

  /* ── DELETE BTN ── */
  .delete-photo {
    position: absolute;
    top: 8px; right: 8px;
    width: 26px; height: 26px;
    background: rgba(255,255,255,0.85);
    border: none; border-radius: 50%;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    color: var(--rose);
    font-size: 14px;
    z-index: 10;
  }

  .photo-slot:hover .delete-photo { display: flex; }

  @media (max-width: 600px) {
    .cover { padding: 60px 24px 48px; }
    .section { padding: 36px 20px 0; }
    .journal-paper { padding: 36px 28px 32px; }
    .journal-paper::before { left: 52px; }
    .nav { padding: 20px 16px; }
  }
</style>
</head>
<body>

<!-- Falling petals -->
<div class="petal-canvas" id="petal-canvas"></div>

<div class="diary-wrap">

  <!-- COVER -->
  <div class="cover">
    <div class="cover-ornament">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z"/></svg>
      <span>A love story</span>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z"/></svg>
    </div>
    <h1 class="cover-title">Chapter <em>Two</em></h1>
    <p class="cover-sub">a diary of beautiful moments</p>
    <div class="cover-date">March 13, 2026</div>
    <div class="divider">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--blush)"><path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z"/></svg>
    </div>
  </div>

  <!-- NAV -->
  <nav class="nav">
    <button class="nav-btn active" onclick="showSection('gallery', this)">Photos</button>
    <button class="nav-btn" onclick="showSection('videos', this)">Videos</button>
    <button class="nav-btn" onclick="showSection('journal', this)">Journal</button>
    <button class="nav-btn" onclick="showSection('timeline', this)">Our Day</button>
  </nav>

  <!-- GALLERY -->
  <div class="section active" id="section-gallery">
    <h2 class="section-heading">Our <em>Photographs</em></h2>
    <p class="section-sub">little windows into our day</p>
    <div class="gallery-grid" id="gallery-grid"></div>
    <label class="upload-zone">
      <input type="file" accept="image/*" multiple onchange="handlePhotos(event)">
      <div class="upload-text">Drop your photos here</div>
      <div class="upload-hint">or click to choose from your gallery</div>
    </label>
  </div>

  <!-- VIDEOS -->
  <div class="section" id="section-videos">
    <h2 class="section-heading">Moving <em>Memories</em></h2>
    <p class="section-sub">moments we want to relive</p>
    <div class="video-grid" id="video-grid"></div>
    <label class="upload-zone">
      <input type="file" accept="video/*" multiple onchange="handleVideos(event)">
      <div class="upload-text">Add your videos here</div>
      <div class="upload-hint">or click to choose from your library</div>
    </label>
  </div>

  <!-- JOURNAL -->
  <div class="section" id="section-journal">
    <h2 class="section-heading">Dear <em>Diary</em></h2>
    <p class="section-sub">words from the heart</p>
    <div class="journal-paper" id="journal-main-paper">
      <div class="journal-date-stamp">March 13, 2026</div>
      <textarea class="journal-textarea" placeholder="Tonight felt like something out of a dream… every little detail, every laugh, every quiet moment — I want to remember it all forever…"></textarea>
      <div class="mood-row">
        <span class="mood-label">Mood ·</span>
      </div>
    </div>
    <button class="add-btn" onclick="addJournalEntry()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add another entry
    </button>
  </div>

  <!-- TIMELINE -->
  <div class="section" id="section-timeline">
    <h2 class="section-heading">Our <em>Day</em></h2>
    <p class="section-sub">moment by moment</p>
    <div class="timeline" id="timeline-list"></div>
    <button class="add-btn" onclick="addTimelineItem()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add a moment
    </button>
  </div>

</div>

<button class="save-bar" onclick="saveAll()">Save memories</button>
<div class="saved-toast" id="saved-toast">Saved with love ♥</div>

<script>
  /* ─── Falling petals ─── */
  (function() {
    const canvas = document.getElementById('petal-canvas');
    const colors = ['#f2c4cf','#e8a8b8','#f7dce4','#d4899e','#fce8ee'];
    const sizes  = [10,14,18,10,12,16];
    for (let i = 0; i < 22; i++) {
      const el = document.createElement('div');
      el.className = 'fp';
      const s = sizes[i % sizes.length];
      el.style.cssText = `
        width:${s}px; height:${s}px;
        left:${Math.random()*100}%;
        background:${colors[i%colors.length]};
        animation-duration:${6+Math.random()*10}s;
        animation-delay:${Math.random()*10}s;
      `;
      canvas.appendChild(el);
    }
  })();

  /* ─── Nav ─── */
  function showSection(name, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('section-' + name).classList.add('active');
    btn.classList.add('active');
    window.scrollTo({ top: document.querySelector('.nav').offsetTop - 10, behavior: 'smooth' });
  }

  /* ─── Mood tags ─── */
  const moods = ['Magical','Giddy','Grateful','Butterflies','Peaceful','Euphoric','Electric','Dreamy'];
  const moodRow = document.querySelector('#journal-main-paper .mood-row');
  moods.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'mood-tag';
    btn.textContent = m;
    btn.onclick = () => btn.classList.toggle('picked');
    moodRow.appendChild(btn);
  });

  /* ─── Photos ─── */
  function handlePhotos(e) {
    const grid = document.getElementById('gallery-grid');
    Array.from(e.target.files).forEach(f => {
      const url = URL.createObjectURL(f);
      const slot = document.createElement('div');
      slot.className = 'photo-slot';
      slot.style.position = 'relative';
      slot.innerHTML = `
        <button class="delete-photo" onclick="this.closest('.photo-slot').remove()" title="Remove">✕</button>
        <img src="${url}" alt="" loading="lazy">
        <div class="photo-caption-area">
          <textarea class="photo-caption-input" rows="1" placeholder="Write a caption…"></textarea>
        </div>`;
      grid.appendChild(slot);
    });
    e.target.value = '';
  }

  /* ─── Videos ─── */
  function handleVideos(e) {
    const grid = document.getElementById('video-grid');
    Array.from(e.target.files).forEach(f => {
      const url = URL.createObjectURL(f);
      const slot = document.createElement('div');
      slot.className = 'video-slot';
      slot.innerHTML = `
        <div class="video-thumb">
          <video src="${url}" preload="metadata"></video>
          <button class="play-btn" onclick="togglePlay(this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          </button>
        </div>
        <div class="video-info">
          <input class="video-title-input" type="text" placeholder="Name this memory…">
        </div>`;
      grid.appendChild(slot);
    });
    e.target.value = '';
  }

  function togglePlay(btn) {
    const vid = btn.previousElementSibling;
    if (vid.paused) {
      vid.play();
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
    } else {
      vid.pause();
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>';
    }
  }

  /* ─── Journal ─── */
  function addJournalEntry() {
    const section = document.getElementById('section-journal');
    const paper = document.createElement('div');
    paper.className = 'journal-paper';
    const now = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
    paper.innerHTML = `
      <div class="journal-date-stamp">${now}</div>
      <textarea class="journal-textarea" placeholder="Another beautiful memory…"></textarea>`;
    section.insertBefore(paper, section.querySelector('.add-btn'));
    paper.scrollIntoView({ behavior: 'smooth', block: 'center' });
    paper.querySelector('textarea').focus();
  }

  /* ─── Timeline ─── */
  const defaultMoments = [
    { time: 'The beginning',   title: '',  notePh: 'Where it all started…' },
    { time: 'A special moment', title: '', notePh: 'The one you want to keep forever…' },
    { time: 'The ending',      title: '',  notePh: 'How the evening drew to a close…' },
  ];

  const tlList = document.getElementById('timeline-list');
  defaultMoments.forEach(m => tlList.appendChild(makeTlItem(m.time, m.notePh)));

  function makeTlItem(timePh, notePh) {
    const div = document.createElement('div');
    div.className = 'tl-item';
    div.innerHTML = `
      <div class="tl-dot"></div>
      <input class="tl-time-input" type="text" placeholder="${timePh}">
      <input class="tl-title-input" type="text" placeholder="Name this moment…">
      <textarea class="tl-note-input" rows="2" placeholder="${notePh}"></textarea>`;
    return div;
  }

  function addTimelineItem() {
    const el = makeTlItem('Time or place', 'What happened here?');
    tlList.appendChild(el);
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.querySelector('input').focus();
  }

  /* ─── Save toast ─── */
  function saveAll() {
    const toast = document.getElementById('saved-toast');
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2800);
  }
</script>
</body>
</html>
